<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Habit Tracker</title>

    <link rel="stylesheet" href="styles.css">

    <script src="script.js"></script>

</head>

<body onload="showLogin()">

<!-- LOGIN -->

<div id="loginBlock" class="container">

    <h2>Login</h2>

    <input id="loginLogin" placeholder="login">
    <input id="loginPassword" type="password" placeholder="password">

    <button onclick="login()">Login</button>

    <div class="link">
        <a href="javascript:showRegister()">Create account</a>
    </div>

</div>

<!-- REGISTER -->

<div id="registerBlock" class="container hidden">

    <h2>Register</h2>

    <input id="regName" placeholder="username">
    <input id="regLogin" placeholder="login">
    <input id="regPassword" type="password" placeholder="password">

    <button onclick="register()">Register</button>

    <div class="link">
        <a href="javascript:showLogin()">Back to login</a>
    </div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="container hidden">

    <h2>My Habits</h2>

    <div id="habitList"></div>

    <h3>Add Habit</h3>

    <input id="habitName" placeholder="habit name">

    <button onclick="addHabit()">Add Habit</button>

</div>

</body>
</html>
